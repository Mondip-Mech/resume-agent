name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same branch so a new push doesn't queue
# behind an already-running workflow.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Test suite ─────────────────────────────────────────────────────────
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements.txt already pins pytest==8.3.3, pytest-asyncio==0.24.0,
          # pytest-cov==5.0.0, httpx==0.27.2, and chromadb>=0.5.0 — don't
          # re-install unpinned versions or they'll override the locked ones.
          pip install -r requirements.txt

      - name: Run test suite
        # All 133 tests run in-process with mocked LLM — no API key needed.
        # omit patterns live in pyproject.toml [tool.coverage.run] to avoid
        # shell glob-expansion of wildcard patterns on Linux runners.
        # TRANSFORMERS_OFFLINE=1 prevents sentence-transformers from downloading
        # the 80 MB all-MiniLM-L6-v2 model; AgentMemory falls back to TF-IDF.
        env:
          TRANSFORMERS_OFFLINE: "1"
          HF_DATASETS_OFFLINE: "1"
          NVIDIA_API_KEY: "test-key-ci"
        run: |
          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            -q

      - name: Upload coverage to Codecov
        # Only upload on Python 3.11 to avoid duplicate reports
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false   # don't fail the build if Codecov is down

  # ── 2. ATS benchmark ─────────────────────────────────────────────────────
  benchmark:
    name: ATS Scorer Benchmark
    runs-on: ubuntu-latest
    needs: test           # only run if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-3.11-bench-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run ATS benchmark
        # Validates heuristic scorer against 15 hand-labelled cases.
        # Fails the build if band accuracy < 80% or Spearman rho < 0.80.
        run: |
          python eval/benchmark_ats.py --verbose

      - name: Eval dry-run
        # Validates fixtures load correctly and ATS scorer works end-to-end.
        # No NVIDIA API key needed — skips the LLM pipeline.
        run: |
          python eval/run_eval.py --dry-run

  # ── 3. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        # E/W = pycodestyle, F = pyflakes, I = isort
        # Ignores: E501 (line length — docstrings are long on purpose)
        #          E402 (module-level import not at top — sys.path inserts in tests)
        run: |
          ruff check . \
            --select E,W,F,I \
            --ignore E501,E402 \
            --exclude ".git,__pycache__,*.egg-info" \
            --output-format github

  # ── 4. Docker build check ─────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test           # only build image if tests pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: job-agent:ci
          # Cache layers between runs for faster builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Bake the model download into the image just like production.
          # If the Dockerfile MODEL_CACHE layer is cached this takes ~5s.
          build-args: |
            BUILDKIT_INLINE_CACHE=1
